<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blogs.nyc.mn - 奶油之家</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] }

            }
        }

    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #f7f9fb; }

        .copy-btn {

</head>

                </a>

            <div class="flex items-center space-x-6 text-xs font-semibold text-zinc-500">

                <a href="https://ip.blogs.nyc.mn" target="_blank" class="hover:text-amber-500 transition-colors">IP查询</a>
                <a href="https://it.blogs.nyc.mn" target="_blank" class="hover:text-amber-500 transition-colors">It-Tools工具箱</a>

    <!-- 主体：奶油卡片宽幅自适应 -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- 视图一：前台首页 -->
        <div id="home-view" class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <!-- 左侧 3 栏：分类与4列卡片流 -->
            <div class="lg:col-span-3 space-y-6 flex flex-col justify-between">

                    <!-- 顶部横幅 -->
                    <div class="bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm">
                        <h1 id="site-title-display" class="text-2xl font-bold tracking-tight text-zinc-900">正在加载...</h1>

                    <!-- 分类选择栏 -->

                    <!-- 卡片网格流 (升级为 4 列网格布局，紧凑视觉) -->

                </div>

                <!-- 复刻深色分页组件 -->

            <!-- 右侧 1 栏：侧边栏 -->

                </div>

                <!-- 侧边栏热门排行榜 -->

        <!-- 视图三：后台管理端 -->

            <!-- 登录面板 -->
            <div id="admin-login-card" class="max-w-md mx-auto bg-white p-8 rounded-2xl border border-zinc-200/60 shadow-md space-y-6 my-12">

                </div>

                <!-- 站点配置 -->
                <div class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm space-y-4">
                    <h3 class="text-base font-bold text-zinc-900 border-b border-zinc-100 pb-3 tracking-tight">自定义站点全局文案</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">主标题</label>
                            <input type="text" id="config-title" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                        </div>

                        </div>
                    </div>
                    <div>

                        <input type="text" id="config-subtitle" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">

                    <div class="flex justify-end pt-2 border-t border-zinc-100">

                <!-- 文章管理 -->
                <div class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-base font-bold text-zinc-900 tracking-tight">文章列表管理</h3>
                        <button onclick="startNewPost()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-xs font-semibold transition-all shadow-sm">
                            + 撰写新教程

                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-zinc-600">
                            <thead>
                                <tr class="border-b border-zinc-100 text-[11px] font-bold uppercase tracking-wider text-zinc-400">
                                    <th class="py-3">文章标题</th>
                                    <th class="py-3">分类</th>
                                    <th class="py-3">阅读量</th>

                                </tr>
                            </thead>

                    </div>
                </div>

                <!-- 编辑器工作区 -->
                <div id="editor-zone" class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm space-y-4">
                    <h3 id="editor-title" class="text-base font-bold text-zinc-900 border-b border-zinc-100 pb-3 tracking-tight">撰写新教程</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">唯一 ID (不可修改)</label>
                            <input type="text" id="admin-id" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="例如: advanced-markdown">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章标题</label>
                            <input type="text" id="admin-title" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">分类选择</label>
                            <select id="admin-category" class="w-full border border-zinc-200 rounded-lg px-3.5 h-10 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all bg-white">
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章摘要</label>
                            <input type="text" id="admin-summary" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">首页封面图 URL (支持 R2 链接)</label>
                            <input type="text" id="admin-cover" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="https://images.blogs.nyc.mn/xxx.png">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">正文 (WYSIWYG 模式：一键切源码 / 分屏 / 全屏)</label>
                        <div id="vditor-container" class="w-full"></div>
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-zinc-100">
                        <button onclick="cancelEdit()" class="border border-zinc-200 hover:bg-zinc-50 text-zinc-600 px-5 py-2 rounded-lg text-sm font-medium transition-colors">
                            取消
                        </button>
                        <button onclick="publishPost()" id="publish-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                            直接发布（瞬间生效）

                    </div>

            </div>

    </main>

    <!-- 修改密码弹窗 -->
    <div id="password-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-80 shadow-lg space-y-4">
            <h3 class="text-base font-bold text-zinc-900">修改后台管理密码</h3>
            <input type="password" id="new-password" class="w-full border border-zinc-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500" placeholder="请输入新密码">
            <div class="flex justify-end gap-2">
                <button onclick="closePasswordModal()" class="text-zinc-500 text-xs hover:underline px-3 py-1">取消</button>
                <button onclick="submitChangePassword()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-1.5 rounded-lg transition-all">确定修改</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-zinc-100 py-10 mt-auto text-xs text-zinc-400 tracking-wide">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full inline-block"></span>
                <span>blogs.nyc.mn • 奶油卡片 6.0 分页版</span>
            </div>
            <div class="text-[11px] text-zinc-400">
                Powered by <a href="https://pages.cloudflare.com" target="_blank" class="hover:underline text-amber-500">Cloudflare Pages</a>
            </div>
        </div>
    </footer>

    <script>
        let vditorInstance = null;
        let R2_DOMAIN = "";
        let currentFilterCategory = "";
        let currentSearchQuery = "";
        let activeCategories = [];
        let currentPageNum = 1; // 记录当前页码

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', async () => {
            await loadSiteConfig();
            handleRouting();
        });

        function handleRouting() {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                showAdminView();
            } else if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                loadPost(postId);
            } else {
                showHomeView();
            }
        }

        async function loadSiteConfig() {
            try {
                const res = await fetch('./api/config?_t=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const title = data.site_title || "Blogs.nyc.mn";
                const subtitle = data.site_subtitle || "无服务器数字花园";
                activeCategories = JSON.parse(data.site_categories || '["技术","教程","随笔","思考"]');

                document.title = title;
                document.getElementById('nav-site-title').innerText = title;
                document.getElementById('site-title-display').innerText = title;
                document.getElementById('site-subtitle-display').innerText = subtitle;

                renderCategoryFilters();
                document.getElementById('config-title').value = title;
                document.getElementById('config-subtitle').value = subtitle;
                document.getElementById('config-categories').value = activeCategories.join(', ');

                fillCategorySelect();
            } catch (err) {
                console.error("加载全局配置出错:", err);
                activeCategories = ["技术", "教程", "随笔", "思考"];
                document.title = "blogs.nyc.mn";
                renderCategoryFilters();
                fillCategorySelect();
            }
        }

        function renderCategoryFilters() {
            const container = document.getElementById('category-filter-container');
            if (!container) return;
            container.innerHTML = `
                <button onclick="filterByCategory('')" class="px-4 py-2 rounded-full text-xs font-semibold tracking-wide transition-all ${!currentFilterCategory ? 'bg-zinc-950 text-white shadow-sm' : 'bg-white text-zinc-500 border border-zinc-100 hover:bg-zinc-50'}">
                    全部
                </button>
            `;
            activeCategories.forEach(cat => {
                const isSelected = currentFilterCategory === cat;
                container.innerHTML += `
                    <button onclick="filterByCategory('${cat}')" class="px-4 py-2 rounded-full text-xs font-semibold tracking-wide transition-all ${isSelected ? 'bg-zinc-950 text-white shadow-sm' : 'bg-white text-zinc-500 border border-zinc-100 hover:bg-zinc-50'}">
                        ${cat}
                    </button>
                `;
            });
        }

        function fillCategorySelect() {
            const select = document.getElementById('admin-category');
            if (!select) return;
            select.innerHTML = '';
            activeCategories.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            select.innerHTML += `<option value="未分类">未分类</option>`;
        }

        async function filterByCategory(cat) {
            currentFilterCategory = cat;
            currentPageNum = 1; // 切换分类时重置回第 1 页
            renderCategoryFilters();
            await fetchPostsAndRender(1);
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                await triggerSearch();
            }
        }

        async function triggerSearch() {
            currentSearchQuery = document.getElementById('search-input').value.trim();
            currentPageNum = 1; // 搜索时重置回第 1 页
            await fetchPostsAndRender(1);
        }

        async function showHomeView() {
            currentFilterCategory = "";
            currentSearchQuery = "";
            currentPageNum = 1; // 重置页码
            const sInput = document.getElementById('search-input');
            if (sInput) sInput.value = "";

            renderCategoryFilters();

            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            
            await fetchPostsAndRender(1);
            await fetchPopularPosts();
        }

        // 核心渲染器 (支持动态页码渲染和 D1 API 分页数据格式)
        async function fetchPostsAndRender(page = 1) {
            currentPageNum = page; // 缓存当前页
            const container = document.getElementById('posts-list-container');
            if (!container) return;
            container.innerHTML = '<p class="text-zinc-400 text-sm">正在加载中...</p>';

            try {
                // 向 D1 发起携带 page 和 limit (每页12条) 的分页请求
                let url = `./api/posts?page=${page}&limit=12&_t=${Date.now()}`;
                if (currentFilterCategory) url += `&category=${encodeURIComponent(currentFilterCategory)}`;
                if (currentSearchQuery) url += `&q=${encodeURIComponent(currentSearchQuery)}`;

                const response = await fetch(url);
                const resData = await response.json();
                
                const posts = resData.results;
                const total = resData.total;
                const limit = resData.limit;

                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-zinc-400 text-sm py-12 text-center">暂无发布内容。</div>';
                    document.getElementById('pagination-container').innerHTML = '';
                    return;
                }

                posts.forEach((post, index) => {
                    const coverHtml = post.cover 
                        ? `<img src="${post.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="${post.title}">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)} flex items-center justify-center text-white/10 font-bold text-3xl select-none">BLOGS</div>`;

                    container.innerHTML += `
                        <div class="group bg-white rounded-2xl border border-zinc-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-300 overflow-hidden flex flex-col justify-between">
                            <div>
                                <div class="h-44 w-full overflow-hidden relative bg-zinc-50">
                                    ${coverHtml}
                                    <span class="absolute top-3 left-3 bg-zinc-900/80 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur-sm uppercase">${post.category || '未分类'}</span>
                                </div>
                                <div class="p-5 space-y-2">
                                    <h3 class="text-base font-bold text-zinc-900 line-clamp-2 group-hover:text-amber-500 transition-colors">
                                        <a href="#/post/${post.id}">${post.title}</a>
                                    </h3>
                                    <p class="text-zinc-500 text-xs leading-relaxed line-clamp-3">${post.summary}</p>
                                </div>
                            </div>
                            <div class="px-5 pb-5 pt-2 border-t border-zinc-50 flex items-center justify-between text-[11px] text-zinc-400">
                                <div class="flex items-center space-x-1.5">
                                    <span class="w-4 h-4 bg-zinc-100 rounded-full flex items-center justify-center text-[10px]">👤</span>
                                    <span class="font-medium">admin</span>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <span>📅 ${post.date}</span>
                                    <span>👁️ ${post.views}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                // 调用底部分页条生成器
                renderPagination(total, limit, page);

            } catch (err) {
                container.innerHTML = `<div class="col-span-full text-red-500 text-sm text-center">获取文章数据失败，请确认配置。</div>`;
            }
        }

        // 【精修升级】复刻深色复古页码导航条 (Ellipsis 折叠页码算法)
        function renderPagination(total, limit, currentPage) {
            const container = document.getElementById('pagination-container');
            if (!container) return;

            const totalPages = Math.ceil(total / limit);
            if (totalPages <= 1) {
                container.innerHTML = ''; // 如果只有 1 页，不显示分页条
                return;
            }

            let pageHtml = "";

            // 1. 上一页 按钮
            if (currentPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage - 1})" class="px-3.5 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] active:scale-95 rounded transition-all">« 上一页</button>`;
            }

            // 算法：限制中间显示的页码，多余的用 ... 代替 (复刻截图效果)
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(1)" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">1</button>`;
                if (startPage > 2) {
                    pageHtml += `<span class="px-1 text-zinc-400 text-xs">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    // 当前页使用橙色高亮
                    pageHtml += `<span class="px-3 py-1.5 text-xs font-bold bg-amber-500 text-white rounded shadow-sm">${i}</span>`;
                } else {
                    pageHtml += `<button onclick="fetchPostsAndRender(${i})" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">${i}</button>`;
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageHtml += `<span class="px-1 text-zinc-400 text-xs">...</span>`;
                }
                pageHtml += `<button onclick="fetchPostsAndRender(${totalPages})" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">${totalPages}</button>`;
            }

            // 2. 下一页 按钮
            if (currentPage < totalPages) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage + 1})" class="px-3.5 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] active:scale-95 rounded transition-all">下一页 »</button>`;
            }

            container.innerHTML = pageHtml;
        }

        async function fetchPopularPosts() {
            const container = document.getElementById('popular-posts-container');
            if (!container) return;
            container.innerHTML = '<p class="text-zinc-400 text-xs">读取中...</p>';

            try {
                const response = await fetch(`./api/posts?popular=5&_t=${Date.now()}`);
                const posts = await response.json();
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p class="text-zinc-400 text-xs">暂无热度统计</p>';
                    return;
                }

                posts.forEach((post, index) => {
                    const thumbHtml = post.cover 
                        ? `<img src="${post.cover}" class="w-full h-full object-cover" alt="">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)}"></div>`;

                    container.innerHTML += `
                        <a href="#/post/${post.id}" class="flex items-center gap-3 p-1.5 hover:bg-zinc-50 rounded-lg transition-colors group">
                            <div class="w-12 h-12 rounded-md overflow-hidden bg-zinc-100 shrink-0">
                                ${thumbHtml}
                            </div>
                            <div class="min-w-0 flex-grow">
                                <h4 class="text-xs font-bold text-zinc-800 line-clamp-2 leading-snug group-hover:text-amber-500 transition-colors">${post.title}</h4>
                                <div class="text-[9px] text-zinc-400 mt-1 flex justify-between">
                                    <span>${post.date}</span>
                                    <span class="font-bold text-amber-500">🔥 ${post.views}</span>
                                </div>
                            </div>
                        </a>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<p class="text-red-500 text-xs">读取排行失败</p>';
            }
        }

        const gradients = [
            "from-indigo-400 to-purple-500",
            "from-pink-400 to-rose-500",
            "from-cyan-400 to-blue-500",
            "from-emerald-400 to-teal-500",
            "from-amber-400 to-orange-500",
            "from-violet-400 to-purple-500"
        ];
        function getGradient(index) {
            return gradients[index % gradients.length];
        }

        async function loadPost(postId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('post-view').classList.remove('hidden');
            
            const postContent = document.getElementById('post-content');
            postContent.innerHTML = '<p class="text-zinc-400 text-sm">正在加载...</p>';

            try {
                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const response = await fetch(`${r2Base}/posts/${postId}.md?_t=` + Date.now());
                
                if (!response.ok) throw new Error();
                const text = await response.text();
                postContent.innerHTML = marked.parse(text);

                fetch(`./api/views?id=${postId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('post-views-count').innerText = `阅读量: ${data.views}`;
                    }).catch(() => {
                        document.getElementById('post-views-count').innerText = `阅读量: -`;
                    });

                addCopyButtons();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            } catch (err) {
                postContent.innerHTML = '<p class="text-red-500 text-sm">无法从 R2 载入文章，请确保跨域策略配置成功。</p>';
            }
        }

        function showAdminView() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            
            const password = getActivePassword();
            if (password) {
                document.getElementById('admin-login-card').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                refreshAdminTable();
                initVditor();
            } else {
                document.getElementById('admin-login-card').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        }

        async function verifyAndLogin() {
            const password = document.getElementById('admin-pass').value;
            if (!password) { alert('密码不可为空'); return; }

            try {
                const res = await fetch('./api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "login", password })
                });

                if (res.ok) {
                    sessionStorage.setItem('admin_password', password);
                    document.getElementById('admin-login-card').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    await refreshAdminTable();
                    initVditor();
                } else {
                    alert('验证失败');
                }
            } catch (err) {
                alert('登录异常: ' + err.message);
            }
        }

        function getActivePassword() { return sessionStorage.getItem('admin_password'); }

        function logoutAdmin() {
            sessionStorage.removeItem('admin_password');
            document.getElementById('admin-pass').value = '';
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('admin-login-card').classList.remove('hidden');
        }

        async function saveSiteConfig() {
            const password = getActivePassword();
            const title = document.getElementById('config-title').value.trim();
            const subtitle = document.getElementById('config-subtitle').value.trim();
            const categoriesStr = document.getElementById('config-categories').value.trim();
            const btn = document.getElementById('save-config-btn');

            if (!title) { alert('主标题不可为空'); return; }
            const categoriesArr = categoriesStr.split(',').map(c => c.trim()).filter(c => c.length > 0);

            btn.innerText = '正在提交...';
            btn.disabled = true;

            try {
                const res = await fetch('./api/config', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        site_title: title,
                        site_subtitle: subtitle,
                        site_categories: categoriesArr
                    })
                });

                if (!res.ok) throw new Error();
                alert('配置修改成功！');
                await loadSiteConfig();
            } catch (e) {
                alert('修改失败');
            } finally {
                btn.innerText = '更新配置（瞬间生效）';
                btn.disabled = false;
            }
        }

        function showChangePasswordModal() { document.getElementById('password-modal').classList.remove('hidden'); }
        function closePasswordModal() { document.getElementById('password-modal').classList.add('hidden'); }

        async function submitChangePassword() {
            const password = getActivePassword();
            const newPassword = document.getElementById('new-password').value.trim();
            if (!newPassword) { alert('新密码不可为空'); return; }

            try {
                const res = await fetch('./api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "change_password", password, newPassword })
                });

                if (res.ok) {
                    alert('后台密码已更新！');
                    closePasswordModal();
                    logoutAdmin();
                } else {
                    alert('修改失败');
                }
            } catch (err) {
                alert('修改出错: ' + err.message);
            }
        }

        function initVditor() {
            if (vditorInstance) return;
            vditorInstance = new Vditor('vditor-container', {
                height: 500,
                mode: 'wysiwyg',
                placeholder: "在此撰写您的教程...支持直接拖拽/粘帖截图自动无感上传至 R2 并排版呈现！",
                cache: { enable: false },
                toolbarConfig: { pin: true },
                toolbar: [
                    "emoji", "headings", "bold", "italic", "strike", "link", "|",
                    "list", "ordered-list", "check", "outdent", "indent", "|",
                    "quote", "line", "code", "inline-code", "insert-after", "insert-before", "|",
                    "table", "|",
                    "undo", "redo", "|",
                    "edit-mode", "html", "preview", "both", "fullscreen"
                ],
                upload: {
                    accept: 'image/*',
                    handler: async (files) => {
                        const file = files[0];
                        const url = await uploadImageViaVditor(file);
                        if (url) {
                            vditorInstance.insertValue(`![图片描述](${url})`);
                        }
                        return null;
                    }
                }
            });
        }

        async function uploadImageViaVditor(file) {
            const password = getActivePassword();
            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('./api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': password },
                    body: formData
                });

                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();

                const urlObj = new URL(data.url);
                R2_DOMAIN = urlObj.origin;

                return data.url;
            } catch (err) {
                alert('图片同步到 R2 存储桶失败: ' + err.message);
                return null;
            }
        }

        async function refreshAdminTable() {
            const tbody = document.getElementById('admin-posts-table');
            if (!tbody) return;
            tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-zinc-400 text-xs">正在读取数据库...</td></tr>';
            
            try {
                const response = await fetch('./api/posts?_t=' + Date.now());
                const posts = await response.json();
                
                // 注意：由于 GET 接口在不传 page 时默认执行分页，
                // 后台管理表格需要获取完整的未分页数据。
                // 接口默认逻辑如果没有 page 限制就会分页，但管理后台数据较少时直接使用 results
                const postsArr = posts.results || posts;
                tbody.innerHTML = '';

                if (postsArr.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-zinc-400 text-xs">暂无文章</td></tr>';
                    return;
                }

                postsArr.forEach(post => {
                    tbody.innerHTML += `
                        <tr class="border-b border-zinc-100 hover:bg-zinc-50/50 transition-colors">
                            <td class="py-3.5 font-semibold text-zinc-900">${post.title}</td>
                            <td class="py-3.5"><span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded text-xs font-semibold">${post.category || '未分类'}</span></td>
                            <td class="py-3.5 text-xs text-zinc-400">${post.views}</td>
                            <td class="py-3.5 text-right space-x-3">
                                <button onclick="editPost('${post.id}', '${post.title}', '${post.summary}', '${post.category || '未分类'}', '${post.cover || ''}')" class="text-indigo-600 hover:text-indigo-800 font-semibold text-xs transition-colors">编辑</button>
                                <button onclick="deletePost('${post.id}')" class="text-red-600 hover:text-red-800 font-semibold text-xs transition-colors">删除</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-red-500 text-xs">列表加载失败。</td></tr>';
            }
        }

        function startNewPost() {
            isEditing = false;
            document.getElementById('admin-id').disabled = false;
            document.getElementById('admin-id').value = '';
            document.getElementById('admin-title').value = '';
            document.getElementById('admin-summary').value = '';
            document.getElementById('admin-cover').value = '';
            document.getElementById('admin-category').value = activeCategories[0] || '未分类';
            vditorInstance.setValue('');
            document.getElementById('editor-title').innerText = '撰写新教程';
            document.getElementById('publish-btn').innerText = '直接发布（瞬间生效）';
            document.getElementById('editor-zone').scrollIntoView({ behavior: 'smooth' });
        }

        async function publishPost() {
            const password = getActivePassword();
            const id = document.getElementById('admin-id').value.trim();
            const title = document.getElementById('admin-title').value.trim();
            const summary = document.getElementById('admin-summary').value.trim();
            const cover = document.getElementById('admin-cover').value.trim();
            const category = document.getElementById('admin-category').value;
            const content = vditorInstance.getValue();
            const btn = document.getElementById('publish-btn');

            if (!id || !title || !content) {
                alert('请填写文章 ID、标题 and 正文');
                return;
            }

            btn.innerText = '正在同步至 D1 + R2...';
            btn.disabled = true;

            try {
                const res = await fetch('./api/posts', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, title, summary, content, category, cover,
                        date: new Date().toISOString().split('T')[0]
                    })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章发布成功！');
                
                await refreshAdminTable();
                startNewPost();
            } catch (err) {
                alert('发布失败: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function editPost(id, title, summary, category, cover) {
            isEditing = true;
            document.getElementById('editor-title').innerText = `编辑教程: ${title}`;
            document.getElementById('publish-btn').innerText = '保存更新';
            
            const adminIdInput = document.getElementById('admin-id');
            adminIdInput.value = id;
            adminIdInput.disabled = true;
            
            document.getElementById('admin-title').value = title;
            document.getElementById('admin-summary').value = summary;
            document.getElementById('admin-cover').value = cover || '';
            document.getElementById('admin-category').value = category || '未分类';

            vditorInstance.setValue('正在从 R2 提取正文内容...');

            try {
                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const res = await fetch(`${r2Base}/posts/${id}.md?_t=` + Date.now());
                if (!res.ok) throw new Error();
                const text = await res.text();
                vditorInstance.setValue(text);
                document.getElementById('editor-zone').scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert('从 R2 读取正文失败');
                vditorInstance.setValue('');
            }
        }

        async function deletePost(id) {
            const password = getActivePassword();
            if (!confirm(`警告：该操作将同时清除 D1 中的该文章记录，并物理清除该文章引用的 R2 媒体文件，是否继续？`)) return;

            try {
                const res = await fetch('./api/delete', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章和关联图片已完全物理销毁！');
                await refreshAdminTable();
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        function cancelEdit() {
            startNewPost();
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((preElement) => {
                if (preElement.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(preElement);

                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerText = '复制';
                button.addEventListener('click', () => {
                    const code = preElement.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = '已复制';
                        setTimeout(() => button.innerText = '复制', 2000);
                    });
                });
                wrapper.appendChild(button);
            });
        }
    </script>
