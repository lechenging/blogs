<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 | 编程技术｜运维技术｜建站技巧｜后端开发｜前端开发｜知识库｜免费资源</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    
    <!-- Modern sans-serif fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        display: ['Space Grotesk', 'Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #f8fafc; /* Slate 50 ultra clean background */
        }

        .code-block-wrapper {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }

        .post-toc button.active {
            color: #6366f1; /* Indigo 500 active text */
            border-left-color: #6366f1;
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .post-toc {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .post-toc::-webkit-scrollbar {
            width: 4px;
        }

        .post-toc::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .post-toc::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        .post-toc::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .image-preview-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
        }

        .image-preview-overlay.active {
            display: flex;
        }

        .image-preview-overlay img {
            max-width: min(1120px, 100%);
            max-height: 88vh;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .back-to-top {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 60;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.12), 0 2px 8px -1px rgba(15, 23, 42, 0.08);
            opacity: 0;
            visibility: hidden;
            transform: translateY(12px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid #e2e8f0;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: #0f172a;
            color: #ffffff;
            border-color: #0f172a;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen flex flex-col antialiased bg-slate-50">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 sm:px-8 min-h-16 py-4 md:py-0 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div class="flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-8 w-full md:w-auto">
                <a href="#/" class="flex items-center space-x-2 shrink-0 group">
                    <span id="nav-site-title" class="text-sm font-display font-bold tracking-tight text-slate-900 group-hover:text-indigo-600 transition-colors">miai.de5.net</span>
                </a>

                <div id="series-navbar-container" class="flex flex-wrap gap-x-5 gap-y-2 text-xs font-semibold text-slate-500">
                </div>
            </div>

            <div class="flex items-center space-x-6 shrink-0">
                <div id="custom-navbar-links" class="hidden md:flex items-center space-x-6 text-xs font-semibold text-slate-600"></div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-6 sm:px-8 py-12">

        <div id="home-view" class="space-y-8">
            <!-- Hero and Search Grid (Equal Heights) -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 items-stretch">
                <!-- Hero Section -->
                <div class="lg:col-span-3 bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-center">
                    <h1 id="site-title-display" class="text-2xl font-bold tracking-tight text-slate-900">正在加载...</h1>
                    <p id="site-subtitle-display" class="text-slate-500 text-xs mt-1.5 leading-relaxed"></p>
                </div>

                <!-- Search Box -->
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-center space-y-4">
                    <h3 class="text-xs font-display font-bold uppercase tracking-wider text-slate-555">文章检索</h3>
                    <div class="relative">
                        <input type="text" id="search-input" onkeydown="handleSearch(event)"
                            class="w-full bg-slate-50 border border-slate-100 hover:border-slate-200 focus:border-indigo-550 rounded-xl pl-4 pr-10 py-2.5 text-xs font-sans focus:outline-none transition-all placeholder-slate-400"
                            placeholder="输入关键字并按回车搜索...">
                        <button onclick="triggerSearch()" class="absolute right-3.5 top-3 text-slate-400 hover:text-slate-655 transition-colors text-xs">🔍</button>
                    </div>
                </div>
            </div>

            <!-- Content Grid (Posts & Popular Ranking) -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-3 space-y-8 flex flex-col justify-between">
                    <div class="space-y-8">
                        <div id="category-filter-container" class="flex flex-wrap gap-2"></div>

                        <div id="posts-list-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                    </div>

                    <div id="pagination-container" class="flex justify-center items-center gap-1.5 pt-12"></div>
                </div>

                <!-- Sidebar -->
                <div class="space-y-6">
                    <!-- Popular Posts -->
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                        <div class="border-b border-slate-100 pb-3 flex items-center justify-between">
                            <h3 class="text-sm font-bold text-slate-500">🔥 热门文章</h3>
                            <span id="popular-top-badge" class="text-[11px] bg-orange-50 text-orange-500 px-2.5 py-1 rounded-md font-bold">TOP 5</span>
                        </div>
                        <div id="popular-posts-container" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Detail View -->
        <div id="post-view" class="hidden max-w-7xl mx-auto">
            <a href="#/" class="mb-8 inline-block text-xs font-semibold text-slate-550 hover:text-indigo-600 flex items-center gap-2 transition-colors">
                ← 返回首页
            </a>
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 items-start">
                <article class="lg:col-span-3 bg-white p-6 sm:p-10 rounded-2xl border border-slate-100 shadow-sm">
                    <header class="mb-10 border-b border-slate-100 pb-8 space-y-4">
                        <div class="flex flex-wrap gap-2 text-[10px] font-bold tracking-wider uppercase font-display">
                            <span id="post-category" class="bg-indigo-50 text-indigo-650 px-2.5 py-1 rounded-md">未分类</span>
                            <span id="post-series" class="bg-slate-50 text-slate-600 px-2.5 py-1 rounded-md">默认系列</span>
                        </div>
                        <h1 id="post-title" class="text-2xl sm:text-4xl font-display font-extrabold tracking-tight text-slate-900 leading-tight">正在加载...</h1>
                        <p id="post-summary" class="hidden text-slate-500 text-sm border-l-2 border-indigo-550 pl-4 py-1.5 leading-relaxed bg-slate-50 rounded-r-lg"></p>
                        
                        <div class="text-xs text-slate-500 flex flex-wrap gap-x-4 gap-y-2 font-medium">
                            <span id="post-date"></span>
                            <span id="post-views-count">阅读量: -</span>
                        </div>
                        <div id="post-cover-wrap" class="hidden overflow-hidden rounded-xl border border-slate-100 bg-slate-50 mt-4">
                            <img id="post-cover" class="w-full max-h-[460px] object-cover" alt="">
                        </div>
                    </header>
                    <section id="post-content" class="prose prose-slate prose-indigo max-w-none text-slate-800 text-[15px] leading-relaxed
                        prose-headings:font-display prose-headings:font-bold prose-headings:text-slate-900 prose-headings:tracking-tight
                        prose-a:text-indigo-600 hover:prose-a:text-indigo-500 hover:prose-a:underline
                        prose-blockquote:border-l-4 prose-blockquote:border-indigo-500 prose-blockquote:bg-slate-50 prose-blockquote:py-2 prose-blockquote:pr-4 prose-blockquote:text-slate-600
                        prose-img:rounded-xl prose-img:border prose-img:border-slate-100 prose-img:cursor-zoom-in
                        prose-pre:bg-slate-900 prose-pre:border prose-pre:border-slate-800 prose-pre:rounded-xl prose-pre:p-0">
                    </section>
                </article>
                <aside class="hidden lg:block sticky top-24 bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <h2 class="text-xs font-display font-bold uppercase tracking-wider text-slate-500 border-b border-slate-100 pb-2 mb-4">文章目录</h2>
                    <nav id="post-toc" class="post-toc text-xs space-y-1.5 text-slate-500">
                        <p class="text-zinc-300">暂无目录</p>
                    </nav>
                </aside>
            </div>
        </div>

        <div id="image-preview-overlay" class="image-preview-overlay" onclick="closeImagePreview()">
            <img id="image-preview-target" src="" alt="图片预览" onclick="event.stopPropagation()">
        </div>

        <button id="back-to-top" class="back-to-top" type="button" aria-label="回到顶部" title="回到顶部">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
            </svg>
        </button>

    </main>

    <footer class="bg-white border-t border-slate-100 py-10 mt-auto text-xs text-slate-400 tracking-wide">
        <div class="max-w-7xl mx-auto px-6 sm:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-indigo-600 rounded-full inline-block"></span>
                <span>自适应 • 极速前端版</span>
            </div>
            <div class="text-[11px] text-slate-400">
                Powered by <a href="https://pages.cloudflare.com" target="_blank"
                    class="hover:underline text-indigo-600 transition-colors">Cloudflare Pages</a>
            </div>
        </div>
    </footer>

    <script>
        let R2_DOMAIN = "";
        let currentFilterSeries = "";
        let currentFilterCategory = "";
        let currentSearchQuery = "";

        let activeCategories = [];
        let activeSeriesList = [];
        let dbNavMeta = {};
        let currentPageNum = 1;
        let globalLayoutMode = "standard";
        let globalPopularLimit = 5;
        let currentSiteTitle = "miai.de5.net";

        marked.setOptions({
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', async () => {
            await loadSiteConfig();
            await fetchNavMeta();
            initBackToTop();
            handleRouting();
        });

        function initBackToTop() {
            const button = document.getElementById('back-to-top');
            if (!button) return;

            const toggleButton = () => {
                button.classList.toggle('visible', window.pageYOffset > 300);
            };

            button.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            window.addEventListener('scroll', toggleButton, { passive: true });
            toggleButton();
        }

        function handleRouting() {
            const hash = window.location.hash;
            if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                loadPost(postId);
            } else if (hash.startsWith('#/series/')) {
                const seriesName = decodeURIComponent(hash.replace('#/series/', ''));
                showSeriesView(seriesName);
            } else {
                showHomeView();
            }
        }

        async function loadSiteConfig() {
            try {
                const res = await fetch('./api/config?_t=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();

                const title = data.site_title || "miai.de5.net";
                const subtitle = data.site_subtitle || "AI， 让思考发声！";
                currentSiteTitle = title;
                activeCategories = JSON.parse(data.site_categories || '["技术","教程","随笔","思考"]');
                activeSeriesList = JSON.parse(data.site_series || '["科学上网","谷歌系列","NAS系列"]');
                const rawNavLinks = JSON.parse(data.site_nav_links || '[{"name": "CC API", "url": "https://napi.mai.us.ci"}]');
                globalLayoutMode = data.site_layout_mode || "standard";

                globalPopularLimit = parseInt(data.site_popular_limit) || 5;
                R2_DOMAIN = data.site_r2_domain || "";

                document.title = title;
                document.getElementById('nav-site-title').innerText = title;
                document.getElementById('site-title-display').innerText = title;
                document.getElementById('site-subtitle-display').innerText = subtitle;

                const badge = document.getElementById('popular-top-badge');
                if (badge) badge.innerText = `TOP ${globalPopularLimit}`;

                renderCustomNavbarLinks(rawNavLinks);
                renderCategoryFilters();

            } catch (err) {
                console.error("加载全局配置出错:", err);
                activeCategories = ["技术", "教程", "随笔", "思考"];
                activeSeriesList = ["科学上网", "谷歌系列", "NAS系列"];
                currentSiteTitle = "miai.de5.net";
                document.title = "miai.de5.net";
                renderCategoryFilters();
            }
        }

        function renderCustomNavbarLinks(linksArray) {
            const container = document.getElementById('custom-navbar-links');
            if (!container) return;
            container.innerHTML = '';
            linksArray.forEach(item => {
                container.innerHTML += `
                    <a href="${item.url}" target="_blank" class="hover:text-slate-900 transition-colors">${item.name}</a>
                `;
            });
        }

        async function fetchNavMeta() {
            try {
                const res = await fetch('./api/posts?get_nav_meta=true&_t=' + Date.now());
                dbNavMeta = await res.json();

                const finalSeriesList = Array.from(new Set([...activeSeriesList, ...Object.keys(dbNavMeta)]));

                const navContainer = document.getElementById('series-navbar-container');
                navContainer.innerHTML = '';

                finalSeriesList.forEach(series => {
                    const isSelected = currentFilterSeries === series;
                    navContainer.innerHTML += `
                        <a href="#/series/${encodeURIComponent(series)}" class="hover:text-slate-900 transition-colors py-1 ${isSelected ? 'text-indigo-650 font-bold border-b-2 border-indigo-600' : 'text-slate-500'}">${series}</a>
                    `;
                });
            } catch (e) {
                console.error("生成导航元数据出错:", e);
            }
        }

        function renderCategoryFilters() {
            const container = document.getElementById('category-filter-container');
            if (!container) return;

            let allowedCategories = activeCategories;

            if (currentFilterSeries && dbNavMeta[currentFilterSeries] && dbNavMeta[currentFilterSeries].length > 0) {
                allowedCategories = dbNavMeta[currentFilterSeries];
            }

            container.innerHTML = `
                <button onclick="filterByCategory('')" class="px-4 py-2 rounded-full text-xs font-semibold transition-all ${!currentFilterCategory ? 'bg-slate-900 text-white shadow-sm' : 'bg-white text-slate-500 border border-slate-100 hover:bg-slate-50'}">
                    全部
                </button>
            `;
            allowedCategories.forEach(cat => {
                const isSelected = currentFilterCategory === cat;
                container.innerHTML += `
                    <button onclick="filterByCategory('${cat}')" class="px-4 py-2 rounded-full text-xs font-semibold transition-all ${isSelected ? 'bg-slate-900 text-white shadow-sm' : 'bg-white text-slate-500 border border-slate-100 hover:bg-slate-50'}">
                        ${cat}
                    </button>
                `;
            });
        }

        async function filterByCategory(cat) {
            currentFilterCategory = cat;
            currentPageNum = 1;
            renderCategoryFilters();
            await fetchPostsAndRender(1);
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                await triggerSearch();
            }
        }

        async function triggerSearch() {
            currentSearchQuery = document.getElementById('search-input').value.trim();
            currentPageNum = 1;
            await fetchPostsAndRender(1);
        }

        async function showHomeView() {
            currentFilterSeries = "";
            currentFilterCategory = "";
            currentSearchQuery = "";
            const sInput = document.getElementById('search-input');
            if (sInput) sInput.value = "";

            await fetchNavMeta();
            renderCategoryFilters();

            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.title = currentSiteTitle;

            await fetchPostsAndRender(1);
            await fetchPopularPosts();
        }

        async function showSeriesView(seriesName) {
            currentFilterSeries = seriesName;
            currentFilterCategory = "";
            currentSearchQuery = "";
            const sInput = document.getElementById('search-input');
            if (sInput) sInput.value = "";

            await fetchNavMeta();
            renderCategoryFilters();

            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.title = `${seriesName} - ${currentSiteTitle}`;

            await fetchPostsAndRender(1);
            await fetchPopularPosts();
        }

        async function fetchPostsAndRender(page = 1) {
            currentPageNum = page;
            const container = document.getElementById('posts-list-container');
            if (!container) return;
            container.innerHTML = '<p class="text-slate-400 text-xs font-sans">正在加载中...</p>';

            try {
                let url = `./api/posts?page=${page}&limit=12&_t=${Date.now()}`;
                if (currentFilterCategory) url += `&category=${encodeURIComponent(currentFilterCategory)}`;
                if (currentFilterSeries) url += `&series=${encodeURIComponent(currentFilterSeries)}`;
                if (currentSearchQuery) url += `&q=${encodeURIComponent(currentSearchQuery)}`;

                const response = await fetch(url);
                const resData = await response.json();

                const posts = resData.results;
                const total = resData.total;
                const limit = resData.limit;

                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-slate-400 text-xs py-16 text-center font-sans">暂无发布内容。</div>';
                    document.getElementById('pagination-container').innerHTML = '';
                    return;
                }

                posts.forEach((post, index) => {
                    const coverHtml = post.cover
                        ? `<img src="${post.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-550" alt="${post.title}">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)} flex items-center justify-center text-white/10 font-bold text-3xl select-none">MIAI</div>`;

                    const summaryHtml = (globalLayoutMode !== 'simple')
                        ? `<p class="text-slate-400 text-xs leading-relaxed line-clamp-2 mt-2 font-sans">${post.summary}</p>`
                        : '';

                    const titleClass = (globalLayoutMode === 'simple')
                        ? "text-[13px] sm:text-sm font-semibold text-slate-900 line-clamp-3 group-hover:text-indigo-600 transition-colors leading-snug"
                        : "text-[13px] sm:text-sm font-semibold text-slate-900 line-clamp-2 group-hover:text-indigo-600 transition-colors leading-snug";

                    container.innerHTML += `
                        <div class="group bg-white rounded-2xl border border-slate-100 hover:border-slate-200 transition-all duration-300 overflow-hidden flex flex-col justify-between shadow-sm hover:shadow-md">
                            <div>
                                <a href="#/post/${post.id}" class="block aspect-video w-full overflow-hidden relative bg-slate-50 border-b border-slate-100 transform translate-z-0 isolate">
                                    ${coverHtml}
                                    <span class="absolute top-3 left-3 bg-slate-950/80 text-white text-[9px] font-bold tracking-wider uppercase font-sans px-2 py-0.5 rounded backdrop-blur-sm z-10">${post.category || '未分类'}</span>
                                </a>
                                <div class="p-5">
                                    <h3 class="${titleClass}">
                                        <a href="#/post/${post.id}" title="${post.title}">${post.title}</a>
                                    </h3>
                                    ${summaryHtml}
                                </div>
                            </div>
                            <div class="px-5 pb-5 pt-2 border-t border-slate-50 flex items-center justify-between text-[10px] text-slate-400 font-semibold font-sans">
                                <span>📅 ${post.date}</span>
                                <span>👁️ ${post.views}</span>
                            </div>
                        </div>
                    `;
                });

                renderPagination(total, limit, page);

            } catch (err) {
                container.innerHTML = `<div class="col-span-full text-red-500 text-xs text-center font-sans">获取文章数据失败，请确认配置。</div>`;
            }
        }

        function renderPagination(total, limit, currentPage) {
            const container = document.getElementById('pagination-container');
            if (!container) return;

            const totalPages = Math.ceil(total / limit);
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let pageHtml = "";
            const btnClass = "px-3.5 py-1.5 text-xs font-semibold bg-white border border-slate-150 hover:bg-slate-50 text-slate-650 active:scale-95 rounded-lg transition-all shadow-sm";
            const activeClass = "px-3.5 py-1.5 text-xs font-bold border border-slate-950 bg-slate-950 text-white rounded-lg shadow-sm";

            if (currentPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage - 1})" class="${btnClass} mr-1">« 上一页</button>`;
            }

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(1)" class="${btnClass} mr-1">1</button>`;
                if (startPage > 2) {
                    pageHtml += `<span class="px-1 text-slate-400 text-xs">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    pageHtml += `<span class="${activeClass} mr-1">${i}</span>`;
                } else {
                    pageHtml += `<button onclick="fetchPostsAndRender(${i})" class="${btnClass} mr-1">${i}</button>`;
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageHtml += `<span class="px-1 text-slate-400 text-xs">...</span>`;
                }
                pageHtml += `<button onclick="fetchPostsAndRender(${totalPages})" class="${btnClass} mr-1">${totalPages}</button>`;
            }

            if (currentPage < totalPages) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage + 1})" class="${btnClass}">下一页 »</button>`;
            }

            container.innerHTML = pageHtml;
        }

        async function fetchPopularPosts() {
            const container = document.getElementById('popular-posts-container');
            if (!container) return;
            container.innerHTML = '<p class="text-slate-400 text-xs font-sans">读取中...</p>';

            try {
                const response = await fetch(`./api/posts?popular=${globalPopularLimit}&_t=${Date.now()}`);
                const posts = await response.json();
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p class="text-slate-400 text-xs font-sans py-4 text-center">暂无热度统计</p>';
                    return;
                }

                posts.forEach((post, index) => {
                    const thumbHtml = post.cover
                        ? `<img src="${post.cover}" class="w-full h-full object-cover" alt="">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)}"></div>`;

                    container.innerHTML += `
                        <a href="#/post/${post.id}" class="flex items-start gap-3 py-2.5 px-1 rounded-xl hover:bg-slate-50 transition-colors group">
                            <div class="w-14 h-12 rounded-lg overflow-hidden bg-slate-100 shrink-0 border border-slate-100">
                                ${thumbHtml}
                            </div>
                            <div class="min-w-0 flex-grow pt-0.5">
                                <h4 class="text-[13px] font-extrabold text-slate-950 line-clamp-2 leading-snug group-hover:text-orange-500 transition-colors">${post.title}</h4>
                                <div class="text-[10px] text-slate-400 mt-1 flex items-center justify-between font-semibold">
                                    <span>${post.date}</span>
                                    <span class="inline-flex items-center gap-1 text-indigo-650 font-bold">👁️ ${post.views}</span>
                                </div>
                            </div>
                        </a>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<p class="text-red-500 text-xs font-sans">读取排行失败</p>';
            }
        }

        const gradients = [
            "from-indigo-400 to-indigo-500",
            "from-slate-400 to-slate-500",
            "from-blue-400 to-blue-500",
            "from-emerald-400 to-teal-500",
            "from-indigo-300 to-purple-400",
            "from-slate-300 to-slate-400"
        ];
        function getGradient(index) {
            return gradients[index % gradients.length];
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>'"]/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[char]));
        }

        function updatePostMeta(post) {
            const title = post.title || '未命名文章';
            document.title = title;
            document.getElementById('post-title').innerText = title;
            document.getElementById('post-date').innerText = post.date ? `发布于 ${post.date}` : '';
            document.getElementById('post-category').innerText = post.category || '未分类';
            document.getElementById('post-series').innerText = post.series || '默认系列';
            document.getElementById('post-views-count').innerText = `阅读量: ${post.views || 0}`;

            const summary = document.getElementById('post-summary');
            if (post.summary) {
                summary.innerText = post.summary;
                summary.classList.remove('hidden');
            } else {
                summary.classList.add('hidden');
            }

            const coverWrap = document.getElementById('post-cover-wrap');
            const cover = document.getElementById('post-cover');
            if (post.cover) {
                cover.src = post.cover;
                cover.alt = title;
                coverWrap.classList.remove('hidden');
            } else {
                cover.removeAttribute('src');
                cover.alt = '';
                coverWrap.classList.add('hidden');
            }
        }

        async function loadPost(postId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('post-view').classList.remove('hidden');

            const postContent = document.getElementById('post-content');
            postContent.innerHTML = '<p class="text-slate-400 text-xs font-sans">正在加载...</p>';
            document.getElementById('post-toc').innerHTML = '<p class="text-zinc-300">正在生成目录...</p>';
            document.getElementById('post-title').innerText = '正在加载...';

            try {
                const metaResponse = await fetch(`./api/posts?id=${encodeURIComponent(postId)}&_t=${Date.now()}`);
                if (!metaResponse.ok) throw new Error('文章元数据不存在');
                const post = await metaResponse.json();
                updatePostMeta(post);

                const r2Base = R2_DOMAIN || window.location.origin;
                const response = await fetch(`${r2Base}/posts/${postId}.md?_t=` + Date.now());

                if (!response.ok) throw new Error();
                const text = await response.text();
                postContent.innerHTML = marked.parse(text);

                fetch(`./api/views?id=${postId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('post-views-count').innerText = `阅读量: ${data.views}`;
                    }).catch(() => {
                        document.getElementById('post-views-count').innerText = `阅读量: -`;
                    });

                addCopyButtons();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                buildPostToc();
                enableImagePreview();
            } catch (err) {
                document.getElementById('post-title').innerText = '文章加载失败';
                document.getElementById('post-toc').innerHTML = '<p class="text-zinc-300">暂无目录</p>';
                postContent.innerHTML = '<p class="text-red-500 text-xs font-sans">无法从 R2 载入文章，请确保跨域策略配置成功。</p>';
            }
        }

        function buildPostToc() {
            const toc = document.getElementById('post-toc');
            const headings = Array.from(document.querySelectorAll('#post-content h2, #post-content h3'));
            if (!toc || headings.length === 0) {
                toc.innerHTML = '<p class="text-zinc-300">暂无目录</p>';
                return;
            }

            const usedIds = new Set();
            toc.innerHTML = headings.map((heading, index) => {
                const baseId = heading.id || `section-${index + 1}`;
                let finalId = baseId;
                let suffix = 1;
                while (usedIds.has(finalId)) {
                    finalId = `${baseId}-${suffix}`;
                    suffix += 1;
                }
                usedIds.add(finalId);
                heading.id = finalId;

                const indentClass = heading.tagName === 'H3' ? 'pl-5' : 'pl-3';
                return `<button type="button" data-target="${finalId}" class="block w-full text-left border-l-2 border-slate-100 ${indentClass} py-1.5 hover:text-indigo-600 hover:border-indigo-600 transition-colors line-clamp-2">${escapeHtml(heading.innerText)}</button>`;
            }).join('');

            toc.querySelectorAll('button[data-target]').forEach((button) => {
                button.addEventListener('click', () => {
                    const target = document.getElementById(button.dataset.target);
                    if (target) {
                        const top = target.getBoundingClientRect().top + window.pageYOffset - 80;
                        window.scrollTo({ top, behavior: 'smooth' });
                    }
                });
            });

            // Scroll spy
            const observerOptions = {
                root: null,
                rootMargin: '-100px 0px -70% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const activeId = entry.target.id;
                        toc.querySelectorAll('button[data-target]').forEach(btn => {
                            if (btn.dataset.target === activeId) {
                                btn.classList.add('active');
                            } else {
                                btn.classList.remove('active');
                            }
                        });
                    }
                });
            }, observerOptions);

            headings.forEach(heading => observer.observe(heading));
        }

        function enableImagePreview() {
            document.querySelectorAll('#post-content img, #post-cover').forEach((img) => {
                img.onclick = () => {
                    const overlay = document.getElementById('image-preview-overlay');
                    const target = document.getElementById('image-preview-target');
                    target.src = img.src;
                    target.alt = img.alt || '图片预览';
                    overlay.classList.add('active');
                };
            });
        }

        function closeImagePreview() {
            const overlay = document.getElementById('image-preview-overlay');
            const target = document.getElementById('image-preview-target');
            overlay.classList.remove('active');
            target.removeAttribute('src');
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((preElement) => {
                if (preElement.parentElement.classList.contains('code-block-wrapper')) return;
                
                const codeEl = preElement.querySelector('code');
                let lang = 'code';
                if (codeEl) {
                    const classes = Array.from(codeEl.classList);
                    const langClass = classes.find(c => c.startsWith('language-') || c.startsWith('hljs'));
                    if (langClass) {
                        lang = langClass.replace('language-', '').replace('hljs', '').trim().toUpperCase();
                    }
                }
                
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper border border-slate-800 rounded-xl my-6 bg-slate-900 overflow-hidden';
                preElement.parentNode.insertBefore(wrapper, preElement);
                
                // Header bar
                const header = document.createElement('div');
                header.className = 'flex items-center justify-between px-4 py-2 border-b border-slate-800 bg-slate-950 text-[10px] uppercase tracking-wider text-slate-400 font-semibold font-sans';
                header.innerHTML = `<span>${lang}</span>`;
                
                const button = document.createElement('button');
                button.className = 'hover:text-slate-100 transition-colors focus:outline-none';
                button.innerText = 'COPY';
                button.addEventListener('click', () => {
                    const code = codeEl ? codeEl.innerText : preElement.innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = 'COPIED';
                        setTimeout(() => button.innerText = 'COPY', 2000);
                    });
                });
                header.appendChild(button);
                
                wrapper.appendChild(header);
                wrapper.appendChild(preElement);
                preElement.className = 'p-4 m-0 overflow-x-auto text-xs font-mono text-slate-200 bg-transparent';
            });
        }
    </script>
