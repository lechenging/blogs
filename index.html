<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blogs.nyc.mn - 数字花园</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .code-block-wrapper { position: relative; }
        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.08); color: #9ca3af;
            border: 1px solid rgba(156, 163, 175, 0.15); border-radius: 6px;
            padding: 4px 10px; font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        .editor-toolbar { border: 1px solid #e4e4e7 !important; border-bottom: none !important; background: #fafafa; border-radius: 8px 8px 0 0 !important; }
        .CodeMirror { border: 1px solid #e4e4e7 !important; border-radius: 0 0 8px 8px !important; font-size: 14px !important; }
    </style>
</head>
<body class="bg-[#fcfcfc] text-zinc-800 min-h-screen flex flex-col antialiased">

    <!-- 导航栏 -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-zinc-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="#" onclick="goHome(); return false;" class="flex items-center space-x-2">
                <span class="w-3.5 h-3.5 bg-indigo-600 rounded-full flex items-center justify-center animate-pulse"></span>
                <span class="text-base font-bold tracking-tight text-zinc-900">blogs.nyc.mn</span>
            </a>
            <div class="flex items-center space-x-6 text-sm">
                <a href="#" onclick="goHome(); return false;" class="text-zinc-500 hover:text-indigo-600 font-medium transition-colors">首页</a>
                <a href="#/admin" class="bg-zinc-900 text-white hover:bg-zinc-800 px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all">后台管理</a>
            </div>
        </div>
    </nav>

    <!-- 主体 -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        
        <!-- 视图一：前台首页 -->
        <div id="home-view" class="space-y-10">
            <div class="border-b border-zinc-100 pb-8">
                <h1 class="text-3xl font-bold tracking-tight text-zinc-900 sm:text-4xl">无服务器数字花园</h1>
                <p class="text-zinc-500 text-sm mt-2 leading-relaxed">动态闭环系统，基于 Cloudflare Pages + R2 + D1 强力驱动。</p>
            </div>
            <div class="space-y-6">
                <h2 class="text-xs font-bold uppercase tracking-widest text-zinc-400">最新发布</h2>
                <div id="posts-list-container" class="grid gap-6"></div>
            </div>
        </div>

        <!-- 视图二：教程详情页 -->
        <div id="post-view" class="hidden">
            <button onclick="goHome()" class="mb-8 text-xs font-semibold uppercase tracking-wider text-zinc-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors">
                ← 返回目录
            </button>
            <div class="mb-6 text-xs text-zinc-400 flex gap-4 border-b border-zinc-100 pb-4">
                <span id="post-date"></span>
                <span id="post-views-count">阅读量: 加载中...</span>
            </div>
            <article id="post-content" class="prose prose-zinc prose-indigo max-w-none prose-img:rounded-xl prose-img:shadow-md prose-img:mx-auto prose-img:border prose-img:border-zinc-100 prose-pre:bg-[#0d1117] prose-pre:border prose-pre:border-zinc-800 prose-pre:rounded-xl prose-pre:p-0"></article>
        </div>

        <!-- 视图三：后台管理端 -->
        <div id="admin-view" class="hidden">
            <!-- 1. 独立登录视窗 -->
            <div id="admin-login-card" class="max-w-md mx-auto bg-white p-8 rounded-2xl border border-zinc-200/60 shadow-md space-y-6 my-12">
                <div class="text-center">
                    <h2 class="text-xl font-bold text-zinc-900">管理后台登录</h2>
                    <p class="text-xs text-zinc-400 mt-1">请输入 D1 数据库中配置的管理密码解锁系统</p>
                </div>
                <div class="space-y-4">
                    <input type="password" id="admin-pass" class="w-full border border-zinc-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="请输入密码 (默认: admin123)">
                    <button onclick="verifyAndLogin()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-white py-2.5 rounded-lg text-sm font-semibold transition-all">
                        确认解锁
                    </button>
                </div>
            </div>

            <!-- 2. 完全解锁后的控制台 -->
            <div id="admin-panel" class="hidden space-y-8 animate-fade-in">
                <!-- 顶层快捷操作与密码修改 -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-xl border border-zinc-100 shadow-sm">
                    <div>
                        <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">身份认证成功</span>
                        <h3 class="text-base font-bold text-zinc-900 mt-2">欢迎进入 blogs.nyc.mn 系统</h3>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button onclick="showChangePasswordModal()" class="border border-zinc-200 hover:bg-zinc-50 text-zinc-600 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors">
                            修改密码
                        </button>
                        <button onclick="logoutAdmin()" class="bg-red-50 text-red-600 hover:bg-red-100 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors">
                            登出后台
                        </button>
                    </div>
                </div>

                <!-- 文章列表与管理 -->
                <div class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-base font-bold text-zinc-900 tracking-tight">文章列表管理</h3>
                        <button onclick="startNewPost()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-xs font-semibold transition-all shadow-sm">
                            + 撰写新教程
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-zinc-600">
                            <thead>
                                <tr class="border-b border-zinc-100 text-[11px] font-bold uppercase tracking-wider text-zinc-400">
                                    <th class="py-3">文章标题</th>
                                    <th class="py-3">阅读量</th>
                                    <th class="py-3 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="admin-posts-table"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 编辑器工作区 -->
                <div id="editor-zone" class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm space-y-4">
                    <h3 id="editor-title" class="text-base font-bold text-zinc-900 border-b border-zinc-100 pb-3 tracking-tight">撰写新教程</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章唯一 ID (用作 R2 存储文件名)</label>
                            <input type="text" id="admin-id" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="例如: advanced-markdown">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章标题</label>
                            <input type="text" id="admin-title" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章摘要</label>
                        <input type="text" id="admin-summary" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">正文 (支持工具栏直接排版 & 图片拖入粘贴自动传 R2)</label>
                        <textarea id="admin-content"></textarea>
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-zinc-100">
                        <button onclick="cancelEdit()" class="border border-zinc-200 hover:bg-zinc-50 text-zinc-600 px-5 py-2 rounded-lg text-sm font-medium transition-colors">
                            取消
                        </button>
                        <button onclick="publishPost()" id="publish-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                            直接发布（瞬间生效）
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 修改密码弹窗 -->
    <div id="password-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-80 shadow-lg space-y-4">
            <h3 class="text-base font-bold text-zinc-900">修改后台管理密码</h3>
            <input type="password" id="new-password" class="w-full border border-zinc-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500" placeholder="请输入新密码">
            <div class="flex justify-end gap-2">
                <button onclick="closePasswordModal()" class="text-zinc-500 text-xs hover:underline px-3 py-1">取消</button>
                <button onclick="submitChangePassword()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-1.5 rounded-lg transition-all">确定修改</button>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t border-zinc-100 py-10 mt-auto text-xs text-zinc-400 tracking-wide">
        <div class="max-w-4xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block"></span>
                <span>blogs.nyc.mn • D1 & R2 4.0 动态闭环系统</span>
            </div>
            <div class="text-[11px] text-zinc-400">
                Powered by <a href="https://pages.cloudflare.com" target="_blank" class="hover:underline text-indigo-500">Cloudflare Pages</a>
            </div>
        </div>
    </footer>

    <script>
        let easyMDEInstance = null;
        let R2_DOMAIN = "";

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', handleRouting);

        function handleRouting() {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                showAdminView();
            } else if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                loadPost(postId);
            } else {
                showHomeView();
            }
        }

        // 验证并登录
        async function verifyAndLogin() {
            const password = document.getElementById('admin-pass').value;
            if (!password) { alert('密码不可为空'); return; }

            try {
                const res = await fetch('./api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "login", password })
                });

                if (res.ok) {
                    sessionStorage.setItem('admin_password', password);
                    document.getElementById('admin-login-card').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    await refreshAdminTable();
                    initEasyMDE();
                } else {
                    alert('密码验证失败，请核对。');
                }
            } catch (err) {
                alert('登录验证出错: ' + err.message);
            }
        }

        function getActivePassword() {
            return sessionStorage.getItem('admin_password');
        }

        function logoutAdmin() {
            sessionStorage.removeItem('admin_password');
            document.getElementById('admin-pass').value = '';
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('admin-login-card').classList.remove('hidden');
        }

        function showChangePasswordModal() { document.getElementById('password-modal').classList.remove('hidden'); }
        function closePasswordModal() { document.getElementById('password-modal').classList.add('hidden'); }

        async function submitChangePassword() {
            const password = getActivePassword();
            const newPassword = document.getElementById('new-password').value.trim();
            if (!newPassword) { alert('新密码不可为空'); return; }

            try {
                const res = await fetch('./api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "change_password", password, newPassword })
                });

                if (res.ok) {
                    alert('管理密码已成功保存至 D1 数据库，并立刻生效。请使用新密码重新登录！');
                    closePasswordModal();
                    logoutAdmin();
                } else {
                    alert('修改失败');
                }
            } catch (err) {
                alert('修改失败: ' + err.message);
            }
        }

        function initEasyMDE() {
            if (easyMDEInstance) return;
            easyMDEInstance = new EasyMDE({
                element: document.getElementById('admin-content'),
                spellChecker: false,
                autosave: { enabled: false },
                placeholder: "撰写教程...支持工具栏。支持拖入/粘贴图片直接同步 R2！",
                renderingConfig: { codeSyntaxHighlighting: true },
                status: ["lines", "words", "cursor"],
                toolbar: [
                    "bold", "italic", "heading", "|", 
                    "quote", "unordered-list", "ordered-list", "|", 
                    "link", "image", "code", "table", "|", 
                    "preview", "side-by-side", "fullscreen", "|", 
                    "guide"
                ]
            });

            const codemirror = easyMDEInstance.codemirror;
            codemirror.on("drop", async (editor, e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0) await uploadImageViaEditor(files[0]);
            });

            codemirror.on("paste", async (editor, e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file') {
                        e.preventDefault();
                        await uploadImageViaEditor(item.getAsFile());
                    }
                }
            });
        }

        async function uploadImageViaEditor(file) {
            const password = getActivePassword();
            const formData = new FormData();
            formData.append('image', file);

            const doc = easyMDEInstance.codemirror.getDoc();
            const cursor = doc.getCursor();
            const placeholder = "\n[正在上传图片到 R2...]\n";
            doc.replaceRange(placeholder, cursor);

            try {
                const res = await fetch('./api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': password },
                    body: formData
                });

                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();

                const urlObj = new URL(data.url);
                R2_DOMAIN = urlObj.origin; 

                const content = doc.getValue();
                doc.setValue(content.replace("[正在上传图片到 R2...]", `![图片描述](${data.url})`));
            } catch (err) {
                alert('图片上传失败: ' + err.message);
                doc.setValue(doc.getValue().replace("[正在上传图片到 R2...]", "\n[图片上传失败]\n"));
            }
        }

        async function showHomeView() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            
            const container = document.getElementById('posts-list-container');
            container.innerHTML = '<p class="text-zinc-400 text-sm">正在加载中...</p>';

            try {
                const response = await fetch('./api/posts?_t=' + Date.now());
                const posts = await response.json();
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p class="text-zinc-400 text-sm py-12 text-center">暂无发布文章，请登录后台发布您的首篇教程。</p>';
                    return;
                }

                posts.forEach(post => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-xl border border-zinc-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-300">
                            <span class="text-xs text-zinc-400 font-medium">${post.date} • 阅读量: ${post.views}</span>
                            <h3 class="text-lg font-bold mt-1.5 mb-2 hover:text-indigo-600 transition-colors"><a href="#/post/${post.id}">${post.title}</a></h3>
                            <p class="text-zinc-500 text-sm mb-4 leading-relaxed">${post.summary}</p>
                            <a href="#/post/${post.id}" class="text-xs font-semibold tracking-wider text-indigo-600 hover:text-indigo-700 uppercase">开始阅读 →</a>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-sm">读取数据库失败，请确认数据库状态和后端接口配置。</p>`;
            }
        }

        async function loadPost(postId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('post-view').classList.remove('hidden');
            
            const postContent = document.getElementById('post-content');
            postContent.innerHTML = '<p class="text-zinc-400 text-sm">正在加载...</p>';

            try {
                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const response = await fetch(`${r2Base}/posts/${postId}.md?_t=` + Date.now());
                
                if (!response.ok) throw new Error();
                const text = await response.text();
                postContent.innerHTML = marked.parse(text);

                fetch(`./api/views?id=${postId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('post-views-count').innerText = `阅读量: ${data.views}`;
                    }).catch(() => {
                        document.getElementById('post-views-count').innerText = `阅读量: -`;
                    });

                addCopyButtons();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            } catch (err) {
                postContent.innerHTML = '<p class="text-red-500 text-sm">无法从 R2 载入文章，请确保该文章已正常发布且 R2 跨域策略配置成功。</p>';
            }
        }

        function showAdminView() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            
            // 每次进入后台，检查是否已经登录过
            const password = getActivePassword();
            if (password) {
                document.getElementById('admin-login-card').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                refreshAdminTable();
                initEasyMDE();
            } else {
                document.getElementById('admin-login-card').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        }

        async function refreshAdminTable() {
            const tbody = document.getElementById('admin-posts-table');
            tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-zinc-400 text-xs">正在读取数据库...</td></tr>';
            
            try {
                const response = await fetch('./api/posts?_t=' + Date.now());
                const posts = await response.json();
                tbody.innerHTML = '';

                if (posts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-zinc-400 text-xs">暂无文章</td></tr>';
                    return;
                }

                posts.forEach(post => {
                    tbody.innerHTML += `
                        <tr class="border-b border-zinc-100 hover:bg-zinc-50/50 transition-colors">
                            <td class="py-3.5 font-semibold text-zinc-900">${post.title}</td>
                            <td class="py-3.5 text-xs text-zinc-400">${post.views}</td>
                            <td class="py-3.5 text-right space-x-3">
                                <button onclick="editPost('${post.id}', '${post.title}', '${post.summary}')" class="text-indigo-600 hover:text-indigo-800 font-semibold text-xs transition-colors">编辑</button>
                                <button onclick="deletePost('${post.id}')" class="text-red-600 hover:text-red-800 font-semibold text-xs transition-colors">删除</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-red-500 text-xs">列表加载失败，请检查登录。</td></tr>';
            }
        }

        function startNewPost() {
            isEditing = false;
            document.getElementById('admin-id').disabled = false;
            document.getElementById('admin-id').value = '';
            document.getElementById('admin-title').value = '';
            document.getElementById('admin-summary').value = '';
            easyMDEInstance.value('');
            document.getElementById('editor-title').innerText = '撰写新教程';
            document.getElementById('publish-btn').innerText = '直接发布（瞬间生效）';
            document.getElementById('editor-zone').scrollIntoView({ behavior: 'smooth' });
        }

        async function publishPost() {
            const password = getActivePassword();
            const id = document.getElementById('admin-id').value.trim();
            const title = document.getElementById('admin-title').value.trim();
            const summary = document.getElementById('admin-summary').value.trim();
            const content = easyMDEInstance.value();
            const btn = document.getElementById('publish-btn');

            if (!id || !title || !content) {
                alert('请填写文章 ID、标题和正文');
                return;
            }

            btn.innerText = '正在同步至 D1 + R2...';
            btn.disabled = true;

            try {
                const res = await fetch('./api/posts', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, title, summary, content,
                        date: new Date().toISOString().split('T')[0]
                    })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章发布成功！');
                
                await refreshAdminTable();
                startNewPost();
            } catch (err) {
                alert('发布失败: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function editPost(id, title, summary) {
            isEditing = true;
            document.getElementById('editor-title').innerText = `编辑教程: ${title}`;
            document.getElementById('publish-btn').innerText = '保存更新';
            
            const adminIdInput = document.getElementById('admin-id');
            adminIdInput.value = id;
            adminIdInput.disabled = true;
            
            document.getElementById('admin-title').value = title;
            document.getElementById('admin-summary').value = summary;

            easyMDEInstance.value('正在从 R2 提取正文内容...');

            try {
                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const res = await fetch(`${r2Base}/posts/${id}.md?_t=` + Date.now());
                if (!res.ok) throw new Error();
                const text = await res.text();
                easyMDEInstance.value(text);
                document.getElementById('editor-zone').scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert('从 R2 读取正文失败');
                easyMDEInstance.value('');
            }
        }

        async function deletePost(id) {
            const password = getActivePassword();
            if (!confirm(`警告：该操作将同时清除 D1 中的该文章记录，以及物理清除 R2 存储桶中该文章内插入的所有图片，是否继续？`)) return;

            try {
                const res = await fetch('./api/delete', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章和关联图片已完全物理销毁！');
                await refreshAdminTable();
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        function cancelEdit() {
            startNewPost();
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((preElement) => {
                if (preElement.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(preElement);

                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerText = '复制';
                button.addEventListener('click', () => {
                    const code = preElement.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = '已复制';
                        setTimeout(() => button.innerText = '复制', 2000);
                    });
                });
                wrapper.appendChild(button);
            });
        }

        function goHome() {
            window.location.hash = '';
        }
    </script>
</body>
</html>
