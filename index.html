<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 | 编程技术｜运维技术｜建站技巧｜后端开发｜前端开发｜知识库｜免费资源</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #f7f9fb;
        }

        .code-block-wrapper {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #9ca3af;
            border: 1px solid rgba(156, 163, 175, 0.15);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .post-toc button.active {
            color: #f59e0b;
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .post-toc {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .post-toc::-webkit-scrollbar {
            width: 5px;
        }

        .post-toc::-webkit-scrollbar-track {
            background: #f4f4f5;
            border-radius: 999px;
        }

        .post-toc::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 999px;
        }

        .post-toc::-webkit-scrollbar-thumb:hover {
            background: #f59e0b;
        }

        .image-preview-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.82);
            backdrop-filter: blur(8px);
        }

        .image-preview-overlay.active {
            display: flex;
        }

        .image-preview-overlay img {
            max-width: min(1120px, 100%);
            max-height: 88vh;
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }
    </style>
</head>

<body class="text-zinc-800 min-h-screen flex flex-col antialiased">

    <nav class="bg-white border-b border-zinc-100 sticky top-0 z-50">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-16 py-3 md:py-0 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div class="flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-8 w-full md:w-auto">
                <a href="#/" class="flex items-center space-x-2 shrink-0">
                    <span
                        class="w-3.5 h-3.5 bg-amber-500 rounded-full flex items-center justify-center animate-pulse"></span>
                    <span id="nav-site-title"
                        class="text-base font-bold tracking-tight text-zinc-900">miai.de5.net</span>
                </a>

                <div id="series-navbar-container"
                    class="flex flex-wrap gap-x-4 gap-y-2 text-xs font-bold text-zinc-500 uppercase tracking-wider">
                </div>
            </div>

            <div class="flex items-center space-x-6 shrink-0">
                <div id="custom-navbar-links"
                    class="hidden md:flex items-center space-x-6 text-xs font-semibold text-zinc-500"></div>

                <a href="./admin.html"
                    class="text-zinc-300 hover:text-amber-500 transition-all p-1.5 rounded-full hover:bg-zinc-50 shrink-0"
                    title="管理控制台">
                    <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">

        <div id="home-view" class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 space-y-6 flex flex-col justify-between">
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-2xl border border-zinc-100 shadow-sm">
                        <h1 id="site-title-display" class="text-2xl font-bold tracking-tight text-zinc-900">正在加载...</h1>
                        <p id="site-subtitle-display" class="text-zinc-500 text-xs mt-1.5 leading-relaxed"></p>
                    </div>

                    <div id="category-filter-container" class="flex flex-wrap gap-2"></div>

                    <div id="posts-list-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6"></div>
                </div>

                <div id="pagination-container" class="flex justify-center items-center gap-1.5 pt-10"></div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-5 rounded-2xl border border-zinc-100 shadow-sm space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-400">文章检索</h3>
                    <div class="relative">
                        <input type="text" id="search-input" onkeydown="handleSearch(event)"
                            class="w-full border border-zinc-200 rounded-xl pl-4 pr-10 py-2.5 text-xs focus:ring-2 focus:ring-amber-500/10 focus:border-amber-500 focus:outline-none transition-all"
                            placeholder="输入关键字并按回车搜索...">
                        <button onclick="triggerSearch()"
                            class="absolute right-3.5 top-3 text-zinc-400 hover:text-zinc-600 text-xs">🔍</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-zinc-100 shadow-sm space-y-4">
                    <div class="border-b border-zinc-100 pb-2 flex items-center justify-between">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-400">🔥 热门文章</h3>
                        <span id="popular-top-badge"
                            class="text-[10px] bg-amber-50 text-amber-600 px-1.5 py-0.5 rounded font-bold">TOP 5</span>
                    </div>
                    <div id="popular-posts-container" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="post-view" class="hidden max-w-7xl mx-auto">
            <a href="#/"
                class="mb-8 inline-block text-xs font-semibold uppercase tracking-wider text-zinc-400 hover:text-amber-500 flex items-center gap-1.5 transition-colors">
                ← 返回首页
            </a>
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 items-start">
                <article class="lg:col-span-3 bg-white p-6 sm:p-8 rounded-2xl border border-zinc-100 shadow-sm">
                    <header class="mb-8 border-b border-zinc-100 pb-6 space-y-4">
                        <div class="flex flex-wrap gap-2 text-[11px] font-bold tracking-wider uppercase">
                            <span id="post-category" class="bg-amber-50 text-amber-600 px-2 py-1 rounded-full">未分类</span>
                            <span id="post-series" class="bg-zinc-100 text-zinc-500 px-2 py-1 rounded-full">默认系列</span>
                        </div>
                        <h1 id="post-title" class="text-2xl sm:text-4xl font-black tracking-tight text-zinc-950 leading-tight">正在加载...</h1>
                        <p id="post-summary" class="hidden text-sm text-zinc-500 leading-relaxed"></p>
                        <div class="text-xs text-zinc-400 flex flex-wrap gap-x-4 gap-y-2">
                            <span id="post-date"></span>
                            <span id="post-views-count">阅读量: -</span>
                        </div>
                        <div id="post-cover-wrap" class="hidden overflow-hidden rounded-2xl border border-zinc-100 bg-zinc-50">
                            <img id="post-cover" class="w-full max-h-[460px] object-cover" alt="">
                        </div>
                    </header>
                    <section id="post-content" class="prose prose-zinc prose-amber max-w-none 
                        prose-headings:font-bold prose-headings:tracking-tight
                        prose-img:rounded-xl prose-img:shadow-md prose-img:mx-auto prose-img:border prose-img:border-zinc-100 prose-img:cursor-zoom-in
                        prose-pre:bg-[#0d1117] prose-pre:border prose-pre:border-zinc-800 prose-pre:rounded-xl prose-pre:p-0">
                    </section>
                </article>
                <aside class="hidden lg:block sticky top-24 bg-white p-5 rounded-2xl border border-zinc-100 shadow-sm">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-zinc-400 mb-4">文章目录</h2>
                    <nav id="post-toc" class="post-toc text-xs space-y-1 text-zinc-500">
                        <p class="text-zinc-300">暂无目录</p>
                    </nav>
                </aside>
            </div>
        </div>

        <div id="image-preview-overlay" class="image-preview-overlay" onclick="closeImagePreview()">
            <img id="image-preview-target" src="" alt="图片预览" onclick="event.stopPropagation()">
        </div>

    </main>

    <footer class="bg-white border-t border-zinc-100 py-10 mt-auto text-xs text-zinc-400 tracking-wide">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-amber-500 rounded-full inline-block"></span>
                <span>自适应 • 极速前端版</span>
            </div>
            <div class="text-[11px] text-zinc-400">
                Powered by <a href="https://pages.cloudflare.com" target="_blank"
                    class="hover:underline text-amber-500">Cloudflare Pages</a>
            </div>
        </div>
    </footer>

    <script>
        let R2_DOMAIN = "";
        let currentFilterSeries = "";
        let currentFilterCategory = "";
        let currentSearchQuery = "";

        let activeCategories = [];
        let activeSeriesList = [];
        let dbNavMeta = {};
        let currentPageNum = 1;
        let globalLayoutMode = "standard";
        let globalPopularLimit = 5;
        let currentSiteTitle = "miai.de5.net";

        marked.setOptions({
            highlight: function (code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', async () => {
            await loadSiteConfig();
            await fetchNavMeta();
            handleRouting();
        });

        function handleRouting() {
            const hash = window.location.hash;
            if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                loadPost(postId);
            } else if (hash.startsWith('#/series/')) {
                const seriesName = decodeURIComponent(hash.replace('#/series/', ''));
                showSeriesView(seriesName);
            } else {
                showHomeView();
            }
        }

        async function loadSiteConfig() {
            try {
                const res = await fetch('./api/config?_t=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();

                const title = data.site_title || "miai.de5.net";
                const subtitle = data.site_subtitle || "AI， 让思考发声！";
                currentSiteTitle = title;
                activeCategories = JSON.parse(data.site_categories || '["技术","教程","随笔","思考"]');
                activeSeriesList = JSON.parse(data.site_series || '["科学上网","谷歌系列","NAS系列"]');
                const rawNavLinks = JSON.parse(data.site_nav_links || '[{"name": "CC API", "url": "https://napi.mai.us.ci"}]');
                globalLayoutMode = data.site_layout_mode || "standard";

                globalPopularLimit = parseInt(data.site_popular_limit) || 5;
                R2_DOMAIN = data.site_r2_domain || "";

                document.title = title;
                document.getElementById('nav-site-title').innerText = title;
                document.getElementById('site-title-display').innerText = title;
                document.getElementById('site-subtitle-display').innerText = subtitle;

                const badge = document.getElementById('popular-top-badge');
                if (badge) badge.innerText = `TOP ${globalPopularLimit}`;

                renderCustomNavbarLinks(rawNavLinks);
                renderCategoryFilters();

            } catch (err) {
                console.error("加载全局配置出错:", err);
                activeCategories = ["技术", "教程", "随笔", "思考"];
                activeSeriesList = ["科学上网", "谷歌系列", "NAS系列"];
                currentSiteTitle = "miai.de5.net";
                document.title = "miai.de5.net";
                renderCategoryFilters();
            }
        }

        function renderCustomNavbarLinks(linksArray) {
            const container = document.getElementById('custom-navbar-links');
            if (!container) return;
            container.innerHTML = '';
            linksArray.forEach(item => {
                container.innerHTML += `
                    <a href="${item.url}" target="_blank" class="hover:text-amber-500 transition-colors">${item.name}</a>
                `;
            });
        }

        async function fetchNavMeta() {
            try {
                const res = await fetch('./api/posts?get_nav_meta=true&_t=' + Date.now());
                dbNavMeta = await res.json();

                const finalSeriesList = Array.from(new Set([...activeSeriesList, ...Object.keys(dbNavMeta)]));

                const navContainer = document.getElementById('series-navbar-container');
                navContainer.innerHTML = '';

                finalSeriesList.forEach(series => {
                    const isSelected = currentFilterSeries === series;
                    navContainer.innerHTML += `
                        <a href="#/series/${encodeURIComponent(series)}" class="hover:text-amber-500 transition-colors ${isSelected ? 'text-amber-500 font-bold border-b-2 border-amber-500 pb-1' : ''}">${series}</a>
                    `;
                });
            } catch (e) {
                console.error("生成导航元数据出错:", e);
            }
        }

        function renderCategoryFilters() {
            const container = document.getElementById('category-filter-container');
            if (!container) return;

            let allowedCategories = activeCategories;

            if (currentFilterSeries && dbNavMeta[currentFilterSeries] && dbNavMeta[currentFilterSeries].length > 0) {
                allowedCategories = dbNavMeta[currentFilterSeries];
            }

            container.innerHTML = `
                <button onclick="filterByCategory('')" class="px-4 py-2 rounded-full text-xs font-semibold tracking-wide transition-all ${!currentFilterCategory ? 'bg-zinc-950 text-white shadow-sm' : 'bg-white text-zinc-500 border border-zinc-100 hover:bg-zinc-50'}">
                    全部
                </button>
            `;
            allowedCategories.forEach(cat => {
                const isSelected = currentFilterCategory === cat;
                container.innerHTML += `
                    <button onclick="filterByCategory('${cat}')" class="px-4 py-2 rounded-full text-xs font-semibold tracking-wide transition-all ${isSelected ? 'bg-zinc-950 text-white shadow-sm' : 'bg-white text-zinc-500 border border-zinc-100 hover:bg-zinc-50'}">
                        ${cat}
                    </button>
                `;
            });
        }

        async function filterByCategory(cat) {
            currentFilterCategory = cat;
            currentPageNum = 1;
            renderCategoryFilters();
            await fetchPostsAndRender(1);
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                await triggerSearch();
            }
        }

        async function triggerSearch() {
            currentSearchQuery = document.getElementById('search-input').value.trim();
            currentPageNum = 1;
            await fetchPostsAndRender(1);
        }

        async function showHomeView() {
            currentFilterSeries = "";
            currentFilterCategory = "";
            currentSearchQuery = "";
            const sInput = document.getElementById('search-input');
            if (sInput) sInput.value = "";

            await fetchNavMeta();
            renderCategoryFilters();

            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.title = currentSiteTitle;

            await fetchPostsAndRender(1);
            await fetchPopularPosts();
        }

        async function showSeriesView(seriesName) {
            currentFilterSeries = seriesName;
            currentFilterCategory = "";
            currentSearchQuery = "";
            const sInput = document.getElementById('search-input');
            if (sInput) sInput.value = "";

            await fetchNavMeta();
            renderCategoryFilters();

            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.title = `${seriesName} - ${currentSiteTitle}`;

            await fetchPostsAndRender(1);
            await fetchPopularPosts();
        }

        async function fetchPostsAndRender(page = 1) {
            currentPageNum = page;
            const container = document.getElementById('posts-list-container');
            if (!container) return;
            container.innerHTML = '<p class="text-zinc-400 text-sm">正在加载中...</p>';

            try {
                let url = `./api/posts?page=${page}&limit=12&_t=${Date.now()}`;
                if (currentFilterCategory) url += `&category=${encodeURIComponent(currentFilterCategory)}`;
                if (currentFilterSeries) url += `&series=${encodeURIComponent(currentFilterSeries)}`;
                if (currentSearchQuery) url += `&q=${encodeURIComponent(currentSearchQuery)}`;

                const response = await fetch(url);
                const resData = await response.json();

                const posts = resData.results;
                const total = resData.total;
                const limit = resData.limit;

                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-zinc-400 text-sm py-12 text-center">暂无发布内容。</div>';
                    document.getElementById('pagination-container').innerHTML = '';
                    return;
                }

                posts.forEach((post, index) => {
                    const coverHtml = post.cover
                        ? `<img src="${post.cover}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 rounded-t-2xl" alt="${post.title}">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)} flex items-center justify-center text-white/10 font-bold text-3xl select-none rounded-t-2xl">BLOGS</div>`;

                    const summaryHtml = (globalLayoutMode !== 'simple')
                        ? `<p class="text-zinc-500 text-xs leading-relaxed line-clamp-2">${post.summary}</p>`
                        : '';

                    const titleClass = (globalLayoutMode === 'simple')
                        ? "text-sm font-bold text-zinc-900 line-clamp-3 group-hover:text-amber-500 transition-colors"
                        : "text-sm font-bold text-zinc-900 line-clamp-1 group-hover:text-amber-500 transition-colors";

                    container.innerHTML += `
                        <div class="group bg-white rounded-2xl border border-zinc-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-300 overflow-hidden flex flex-col justify-between">
                            <div>
                                <a href="#/post/${post.id}" class="block aspect-video w-full overflow-hidden relative bg-zinc-50 rounded-t-2xl transform translate-z-0 isolate">
                                    ${coverHtml}
                                    <span class="absolute top-3 left-3 bg-zinc-900/80 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur-sm uppercase z-10">${post.category || '未分类'}</span>
                                </a>
                                <div class="p-5 space-y-2">
                                    <h3 class="${titleClass}">
                                        <a href="#/post/${post.id}" title="${post.title}">${post.title}</a>
                                    </h3>
                                    ${summaryHtml}
                                </div>
                            </div>
                            <div class="px-5 pb-5 pt-2 border-t border-zinc-50 flex items-center justify-between text-[10px] text-zinc-400">
                                <span>📅 ${post.date}</span>
                                <span>👁️ ${post.views}</span>
                            </div>
                        </div>
                    `;
                });

                renderPagination(total, limit, page);

            } catch (err) {
                container.innerHTML = `<div class="col-span-full text-red-500 text-sm text-center">获取文章数据失败，请确认配置。</div>`;
            }
        }

        function renderPagination(total, limit, currentPage) {
            const container = document.getElementById('pagination-container');
            if (!container) return;

            const totalPages = Math.ceil(total / limit);
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let pageHtml = "";

            if (currentPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage - 1})" class="px-3.5 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] active:scale-95 rounded transition-all">« 上一页</button>`;
            }

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(1)" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">1</button>`;
                if (startPage > 2) {
                    pageHtml += `<span class="px-1 text-zinc-400 text-xs">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    pageHtml += `<span class="px-3 py-1.5 text-xs font-bold bg-amber-500 text-white rounded shadow-sm">${i}</span>`;
                } else {
                    pageHtml += `<button onclick="fetchPostsAndRender(${i})" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">${i}</button>`;
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageHtml += `<span class="px-1 text-zinc-400 text-xs">...</span>`;
                }
                pageHtml += `<button onclick="fetchPostsAndRender(${totalPages})" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">${totalPages}</button>`;
            }

            if (currentPage < totalPages) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage + 1})" class="px-3.5 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] active:scale-95 rounded transition-all">下一页 »</button>`;
            }

            container.innerHTML = pageHtml;
        }

        async function fetchPopularPosts() {
            const container = document.getElementById('popular-posts-container');
            if (!container) return;
            container.innerHTML = '<p class="text-zinc-400 text-xs">读取中...</p>';

            try {
                const response = await fetch(`./api/posts?popular=${globalPopularLimit}&_t=${Date.now()}`);
                const posts = await response.json();
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p class="text-zinc-400 text-xs">暂无热度统计</p>';
                    return;
                }

                posts.forEach((post, index) => {
                    const thumbHtml = post.cover
                        ? `<img src="${post.cover}" class="w-full h-full object-cover rounded-md animate-fade-in" alt="">`
                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)} rounded-md"></div>`;

                    container.innerHTML += `
                        <a href="#/post/${post.id}" class="flex items-center gap-3 p-1.5 hover:bg-zinc-50 rounded-lg transition-colors group animate-fade-in">
                            <div class="w-12 h-12 rounded-md overflow-hidden bg-zinc-100 shrink-0">
                                ${thumbHtml}
                            </div>
                            <div class="min-w-0 flex-grow">
                                <h4 class="text-xs font-bold text-zinc-800 line-clamp-2 leading-snug group-hover:text-amber-500 transition-colors">${post.title}</h4>
                                <div class="text-[9px] text-zinc-400 mt-1 flex justify-between">
                                    <span>${post.date}</span>
                                    <span class="font-bold text-amber-500">👁️ ${post.views}</span>
                                </div>
                            </div>
                        </a>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<p class="text-red-500 text-xs">读取排行失败</p>';
            }
        }

        const gradients = [
            "from-indigo-400 to-purple-500",
            "from-pink-400 to-rose-500",
            "from-cyan-400 to-blue-500",
            "from-emerald-400 to-teal-500",
            "from-amber-400 to-orange-500",
            "from-violet-400 to-purple-500"
        ];
        function getGradient(index) {
            return gradients[index % gradients.length];
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>'"]/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[char]));
        }

        function updatePostMeta(post) {
            const title = post.title || '未命名文章';
            document.title = title;
            document.getElementById('post-title').innerText = title;
            document.getElementById('post-date').innerText = post.date ? `发布于 ${post.date}` : '';
            document.getElementById('post-category').innerText = post.category || '未分类';
            document.getElementById('post-series').innerText = post.series || '默认系列';
            document.getElementById('post-views-count').innerText = `阅读量: ${post.views || 0}`;

            const summary = document.getElementById('post-summary');
            if (post.summary) {
                summary.innerText = post.summary;
                summary.classList.remove('hidden');
            } else {
                summary.classList.add('hidden');
            }

            const coverWrap = document.getElementById('post-cover-wrap');
            const cover = document.getElementById('post-cover');
            if (post.cover) {
                cover.src = post.cover;
                cover.alt = title;
                coverWrap.classList.remove('hidden');
            } else {
                cover.removeAttribute('src');
                cover.alt = '';
                coverWrap.classList.add('hidden');
            }
        }

        async function loadPost(postId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('post-view').classList.remove('hidden');

            const postContent = document.getElementById('post-content');
            postContent.innerHTML = '<p class="text-zinc-400 text-sm">正在加载...</p>';
            document.getElementById('post-toc').innerHTML = '<p class="text-zinc-300">正在生成目录...</p>';
            document.getElementById('post-title').innerText = '正在加载...';

            try {
                const metaResponse = await fetch(`./api/posts?id=${encodeURIComponent(postId)}&_t=${Date.now()}`);
                if (!metaResponse.ok) throw new Error('文章元数据不存在');
                const post = await metaResponse.json();
                updatePostMeta(post);

                const r2Base = R2_DOMAIN || window.location.origin;
                const response = await fetch(`${r2Base}/posts/${postId}.md?_t=` + Date.now());

                if (!response.ok) throw new Error();
                const text = await response.text();
                postContent.innerHTML = marked.parse(text);

                fetch(`./api/views?id=${postId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('post-views-count').innerText = `阅读量: ${data.views}`;
                    }).catch(() => {
                        document.getElementById('post-views-count').innerText = `阅读量: -`;
                    });

                addCopyButtons();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                buildPostToc();
                enableImagePreview();
            } catch (err) {
                document.getElementById('post-title').innerText = '文章加载失败';
                document.getElementById('post-toc').innerHTML = '<p class="text-zinc-300">暂无目录</p>';
                postContent.innerHTML = '<p class="text-red-500 text-sm">无法从 R2 载入文章，请确保跨域策略配置成功。</p>';
            }
        }

        function buildPostToc() {
            const toc = document.getElementById('post-toc');
            const headings = Array.from(document.querySelectorAll('#post-content h2, #post-content h3'));
            if (!toc || headings.length === 0) {
                toc.innerHTML = '<p class="text-zinc-300">暂无目录</p>';
                return;
            }

            const usedIds = new Set();
            toc.innerHTML = headings.map((heading, index) => {
                const baseId = heading.id || `section-${index + 1}`;
                let finalId = baseId;
                let suffix = 1;
                while (usedIds.has(finalId)) {
                    finalId = `${baseId}-${suffix}`;
                    suffix += 1;
                }
                usedIds.add(finalId);
                heading.id = finalId;

                const indentClass = heading.tagName === 'H3' ? 'pl-5' : 'pl-3';
                return `<button type="button" data-target="${finalId}" class="block w-full text-left border-l-2 border-zinc-100 ${indentClass} py-1.5 hover:text-amber-500 hover:border-amber-500 transition-colors line-clamp-2">${escapeHtml(heading.innerText)}</button>`;
            }).join('');

            toc.querySelectorAll('button[data-target]').forEach((button) => {
                button.addEventListener('click', () => {
                    const target = document.getElementById(button.dataset.target);
                    if (target) {
                        const top = target.getBoundingClientRect().top + window.pageYOffset - 50;
                        window.scrollTo({ top, behavior: 'smooth' });
                    }
                });
            });
        }

        function enableImagePreview() {
            document.querySelectorAll('#post-content img, #post-cover').forEach((img) => {
                img.onclick = () => {
                    const overlay = document.getElementById('image-preview-overlay');
                    const target = document.getElementById('image-preview-target');
                    target.src = img.src;
                    target.alt = img.alt || '图片预览';
                    overlay.classList.add('active');
                };
            });
        }

        function closeImagePreview() {
            const overlay = document.getElementById('image-preview-overlay');
            const target = document.getElementById('image-preview-target');
            overlay.classList.remove('active');
            target.removeAttribute('src');
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((preElement) => {
                if (preElement.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(preElement);

                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerText = '复制';
                button.addEventListener('click', () => {
                    const code = preElement.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = '已复制';
                        setTimeout(() => button.innerText = '复制', 2000);
                    });
                });
                wrapper.appendChild(button);
            });
        }
    </script>
</body>

</html>
